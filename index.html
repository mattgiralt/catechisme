<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Catéchisme en 134 questions et réponses. Navigation simple, favoris, mode sombre et réglages de lecture." />
  <meta property="og:title" content="Catéchisme" />
  <meta property="og:description" content="Catéchisme en 134 questions et réponses. Navigation simple, favoris, mode sombre et réglages de lecture." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Catéchisme" />
  <meta name="twitter:description" content="Catéchisme en 134 questions et réponses. Navigation simple, favoris, mode sombre et réglages de lecture." />
  <link rel="manifest" href="manifest.json" />
  <title>Catéchisme</title>
  <style>
    :root{
      --bg:#ffffff;
      --fg:#1d1d1f;
      --muted:#6b6b73;
      --card:#f4f4f6;
      --line:#e6e6ea;
      --accent:#2E2F33;
      --shadow:0 10px 30px rgba(0,0,0,.10);
      --radius:18px;
      --serif: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, "Georgia", serif;
      --sans: ui-sans-serif, -apple-system, system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
      --focus:rgba(46,47,51,.25);

      /* Mobile-first sizing */
      --ui:14px;
      --q:clamp(34px, 7.6vw, 46px);
      --a:clamp(18px, 4.3vw, 22px);
      --tap:44px;
      --tap-lg:56px;
      --pad:20px;
    }

    body.theme-dark{
      --bg:#0b0b0d;
      --fg:#f5f5f7;
      --muted:#a2a2aa;
      --card:#151519;
      --line:#2a2a31;
      --accent:#4aa3ff;
      --focus:rgba(74,163,255,.25);
      --shadow:0 18px 45px rgba(0,0,0,.35);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:var(--sans);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* iOS viewport stability */
    .app{
      min-height:100vh;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
    }

    header{
      position:sticky;
      top:0;
      z-index:10;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:
        calc(10px + env(safe-area-inset-top))
        var(--pad)
        10px
        var(--pad);
      backdrop-filter:saturate(1.2) blur(10px);
    }
    body.theme-light header{ background:rgba(255,255,255,.88); border-bottom:1px solid rgba(0,0,0,.04); }
    body.theme-dark header{ background:rgba(11,11,13,.78); border-bottom:1px solid rgba(255,255,255,.06); }

    .header-title{
      font-size:var(--ui);
      font-weight:600;
      letter-spacing:.2px;
      color:var(--muted);
      user-select:none;
    }

    .icon-btn{
      width:52px;
      height:52px;
      border:none;
      background:transparent;
      color:var(--fg);
      border-radius:14px;
      display:grid;
      place-items:center;
      cursor:pointer;
      font-size:22px;
      transition:transform .08s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .icon-btn:active{ transform:scale(.98); }
    .icon-btn:focus-visible{ outline:3px solid var(--focus); outline-offset:2px; }
    .icon-btn svg,.mini svg,.nav .arrow svg{ width:24px; height:24px; display:block; }
    .icon-btn svg{ width:26px; height:26px; }
    .nav .arrow svg{ width:28px; height:28px; }
    .mini svg{ width:26px; height:26px; }
    .btn-icon{ stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .btn-icon.filled{ fill:currentColor; stroke:none; }
    .bookmarkBtn .star-fill{ opacity:0; transition:opacity .15s ease; }
    .bookmarkBtn.is-bookmarked .star-fill{ opacity:1; }

    main{
      flex:1;
      position:relative;
      padding:20px var(--pad) calc(20px + env(safe-area-inset-bottom));
      max-width:720px;
      width:100%;
      margin:0 auto;
    }

    .settings-backdrop{
      position:fixed;
      inset:0;
      background:transparent;
      display:none;
      z-index:5;
    }
    .settings-backdrop.show{ display:block; }
    #settingsView.active{ position:relative; z-index:6; }

    .view{ display:none; }
    .view.active{ display:block; }

    .question-wrap{
      padding:28px 0 200px;
    }

    .center{ text-align:center; }

    .qnum{
      font-size:12px;
      letter-spacing:.18em;
      color:var(--muted);
      margin:4px 0 18px;
    }

    .qtext{
      font-family:var(--serif);
      font-weight:600;
      font-size:var(--q);
      line-height:1.08;
      margin:0 0 16px;
      color:var(--accent);
    }
    body.theme-dark .qtext{ color:var(--fg); }

    .divider{
      width:min(220px, 62%);
      margin:16px auto 20px;
      height:2px;
      background:var(--accent);
      opacity:.85;
      border-radius:2px;
    }

    .answer{
      font-size:var(--a);
      line-height:1.35;
      margin:0 0 32px;
      color:var(--fg);
      transition:opacity .2s ease;
    }
    .answer.hidden{ opacity:0; height:0; margin:0; overflow:hidden; }

    .pill-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      min-height:var(--tap);
      border:none;
      border-radius:999px;
      background:transparent;
      color:var(--accent);
      font-size:15px;
      font-weight:650;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      min-width:160px;
    }
    .pill-btn:focus-visible{ outline:3px solid var(--focus); outline-offset:2px; }
    .icon-btn:hover,.pill-btn:hover,.mini:hover,.nav .arrow:hover:not(:disabled){ opacity:.9; }

    .actions{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-top:14px;
      gap:10px;
    }
    .actions .pill-btn{ flex:0 0 auto; }
    .mini{
      width:var(--tap-lg);
      height:var(--tap-lg);
      border:none;
      border-radius:16px;
      background:transparent;
      color:var(--accent);
      cursor:pointer;
      display:grid;
      place-items:center;
      -webkit-tap-highlight-color:transparent;
    }
    .mini:focus-visible{ outline:3px solid var(--focus); outline-offset:2px; }
    .nav .mini{ font-size:24px; }

    .nav{
      position:fixed;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:100%;
      max-width:720px;
      display:flex;
      flex-direction:column;
      gap:14px;
      padding:16px var(--pad) calc(16px + env(safe-area-inset-bottom));
      background:var(--bg);
      box-sizing:border-box;
      touch-action:manipulation;
    }
    .nav .actions{ margin-top:0; }
    .nav-row{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .nav .arrow{
      width:var(--tap-lg);
      height:var(--tap-lg);
      border:none;
      border-radius:16px;
      background:transparent;
      color:var(--accent);
      font-size:26px;
      cursor:pointer;
      display:grid;
      place-items:center;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    .nav .arrow:disabled{ opacity:.4; cursor:not-allowed; }

    input[type="range"]{
      width:100%;
      height:28px;
      accent-color:var(--accent);
    }

    .list-search-wrap{
      position:sticky;
      top:0;
      z-index:2;
      padding-bottom:12px;
      margin-bottom:8px;
      background:var(--bg);
    }
    .list-search{
      width:100%;
      padding:12px 16px;
      font-size:16px;
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--card);
      color:var(--fg);
      -webkit-appearance:none;
      appearance:none;
    }
    .list-search::placeholder{ color:var(--muted); }
    .list-search:focus{ outline:2px solid var(--accent); outline-offset:2px; }
    .list{
      overflow:hidden;
    }
    .list-item[data-hidden="true"]{ display:none; }
    .list-item{
      display:flex;
      flex-direction:column;
      gap:0;
      padding:14px 0;
      border-bottom:1px solid var(--line);
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .list-item:last-child{ border-bottom:none; }
    .list-item-empty{ justify-content:center; cursor:default; }
    .list-item-empty .t{ color:var(--muted); font-weight:600; }
    .list-item .n{
      flex:0 0 2.5em;
      width:2.5em;
      min-width:2.5em;
      color:var(--muted);
      font-weight:750;
      text-align:right;
      font-variant-numeric:tabular-nums;
    }
    .list-item .t{
      flex:1;
      min-width:0;
      font-family:var(--serif);
      color:var(--accent);
      font-weight:700;
      line-height:1.12;
    }
    body.theme-dark .list-item .t{ color:var(--fg); }
    .list-item-row{ display:flex; align-items:baseline; gap:12px; }
    .list-item-answer{
      display:none;
      padding:10px 0 6px 0;
      padding-left:52px;
      font-size:15px;
      line-height:1.4;
      color:var(--fg);
    }
    .list-item.expanded .list-item-answer{ display:block; }

    .content-card{
      padding:16px 0;
      line-height:1.55;
      font-size:15px;
      color:var(--fg);
    }
    .content-card h2{
      margin:0 0 10px;
      font-family:var(--serif);
      color:var(--accent);
      font-size:22px;
    }
    body.theme-dark .content-card h2{ color:var(--fg); }
    .content-card p{ margin:0 0 12px; }
    .content-card p:last-child{ margin:0; }

    /* Menu (top panel) */
    .sheet-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      z-index:100;
    }
    .sheet-backdrop.show{ display:block; }

    .sheet{
      position:fixed;
      top:0;
      left:0;
      right:0;
      bottom:0;
      width:100%;
      padding:env(safe-area-inset-top) var(--pad) env(safe-area-inset-bottom);
      background:var(--bg);
      z-index:101;
      display:none;
      overflow:auto;
    }
    .sheet.show{ display:block; }

    .sheet header{
      position:static;
      padding:12px 0 8px;
      backdrop-filter:none;
      background:transparent;
    }
    .sheet-title{
      font-weight:750;
      color:var(--fg);
      font-size:16px;
    }
    .sheet-body{ padding:8px 0 14px; }

    .menu-list{ display:grid; gap:4px; }
    .menu-item{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 0;
      min-height:var(--tap);
      background:none;
      border:none;
      color:var(--fg);
      cursor:pointer;
      text-align:left;
      font-size:15px;
      font-weight:650;
      -webkit-tap-highlight-color:transparent;
    }
    .menu-item small{ font-weight:600; color:var(--muted); }
    .sheet .icon-btn{ border:none; }

    .settings{ display:grid; gap:12px; }
    .row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
    }
    .row label{ font-weight:700; font-size:15px; line-height:1.25; }
    .row .sub{ display:block; font-weight:600; font-size:12px; color:var(--muted); margin-top:3px; }
    .row .toggle{ margin-top:-5px; }

    .toggle{
      width:52px;
      height:30px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.06);
      position:relative;
      cursor:pointer;
      flex:0 0 auto;
      -webkit-tap-highlight-color:transparent;
    }
    body.theme-dark .toggle{ background:rgba(255,255,255,.06); }
    .toggle .knob{
      position:absolute;
      top:3px;
      left:3px;
      width:24px;
      height:24px;
      border-radius:999px;
      background:var(--bg);
      border:1px solid var(--line);
      transition:left .15s ease;
    }
    .toggle.on{
      background:var(--accent);
      border-color:transparent;
    }
    .toggle.on .knob{ left:25px; }

    .slider-wrap{
      padding:12px 0;
    }
    .slider-wrap .lbl{
      font-weight:800;
      margin-bottom:10px;
      font-size:14px;
    }
    .font-size-options{
      display:flex;
      gap:10px;
      margin-top:12px;
    }
    .font-size-option{
      flex:1;
      padding:12px 8px;
      min-height:var(--tap);
      border-radius:12px;
      border:1px solid var(--line);
      background:transparent;
      color:var(--fg);
      font-size:15px;
      font-weight:650;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .font-size-option:hover{ background:var(--card); }
    .font-size-option.selected{
      background:var(--accent);
      color:var(--bg);
      border-color:var(--accent);
    }

    .reset-wrap{
      padding:24px 0 12px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .reset-btn{
      align-self:flex-start;
      padding:10px 16px;
      border:1px solid var(--line);
      border-radius:12px;
      background:transparent;
      color:var(--muted);
      font-size:14px;
      font-weight:650;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .reset-btn:hover{ color:var(--fg); border-color:var(--muted); }
    .reset-sub{ font-size:12px; font-weight:600; color:var(--muted); }
    .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

    @media (min-width:768px){
      :root{
        --ui:16px;
        --q:clamp(44px, 4.4vw, 56px);
        --a:clamp(20px, 1.7vw, 24px);
        --pad:24px;
      }
      .question-wrap{ padding:32px 0 200px; }
    }
  </style>
</head>

<body class="theme-light">
  <div class="app">
    <header>
      <button class="icon-btn" id="menuBtn" aria-label="Menu"><svg viewBox="0 0 24 24" class="btn-icon" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <div class="header-title" id="headerTitle">Question</div>
      <button class="icon-btn" id="backBtn" aria-label="Retour aux questions" style="display:none;"><svg viewBox="0 0 24 24" class="btn-icon" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      <button class="icon-btn" id="settingsBtn" aria-label="Réglages"><svg viewBox="0 0 24 24" class="btn-icon filled" aria-hidden="true"><path d="M14.647 4.081a.724 .724 0 0 0 1.08 .448c2.439 -1.485 5.23 1.305 3.745 3.744a.724 .724 0 0 0 .447 1.08c2.775 .673 2.775 4.62 0 5.294a.724 .724 0 0 0 -.448 1.08c1.485 2.439 -1.305 5.23 -3.744 3.745a.724 .724 0 0 0 -1.08 .447c-.673 2.775 -4.62 2.775 -5.294 0a.724 .724 0 0 0 -1.08 -.448c-2.439 1.485 -5.23 -1.305 -3.745 -3.744a.724 .724 0 0 0 -.447 -1.08c-2.775 -.673 -2.775 -4.62 0 -5.294a.724 .724 0 0 0 .448 -1.08c-1.485 -2.439 1.305 -5.23 3.744 -3.745a.722 .722 0 0 0 1.08 -.447c.673 -2.775 4.62 -2.775 5.294 0zm-2.647 4.919a3 3 0 1 0 0 6a3 3 0 0 0 0 -6z"/></svg></button>
    </header>

    <main>
      <div class="settings-backdrop" id="settingsBackdrop" aria-hidden="true"></div>
      <!-- Annonce pour lecteurs d'écran (aria-live) -->
      <div id="liveAnnouncer" aria-live="polite" aria-atomic="true" class="sr-only"></div>

      <section id="questionView" class="view active" aria-label="Question">
        <div class="question-wrap">
          <div class="center">
            <div class="qnum" id="qNum">QUESTION 1</div>
            <h2 class="qtext" id="qText" tabindex="-1">Qui t'a créé?</h2>
            <div class="divider" aria-hidden="true"></div>

            <p class="answer" id="aText">Dieu m'a créé.</p>
          </div>

          <div class="nav" aria-label="Navigation et actions">
            <div class="actions" aria-label="Actions">
              <button class="mini bookmarkBtn" id="bookmarkBtn" aria-label="Ajouter aux favoris" title="Favori">
                <svg viewBox="0 0 24 24" class="btn-icon" aria-hidden="true"><path class="star-outline" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/><path class="star-fill btn-icon filled" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </button>
              <button class="pill-btn" id="toggleAnswer">Masquer la réponse</button>
              <button class="mini" id="shuffleBtn" aria-label="Question aléatoire" title="Mélanger">
                <svg viewBox="0 0 24 24" class="btn-icon" aria-hidden="true"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
              </button>
            </div>
            <div class="nav-row">
              <button class="arrow" id="prevBtn" aria-label="Précédent"><svg viewBox="0 0 24 24" class="btn-icon" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg></button>
              <input type="range" id="qSlider" min="0" max="0" value="0" step="1" aria-label="Aller à une question" />
              <button class="arrow" id="nextBtn" aria-label="Suivant"><svg viewBox="0 0 24 24" class="btn-icon" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg></button>
            </div>
          </div>
        </div>
      </section>

      <section id="listView" class="view" aria-label="Liste des questions">
        <div class="list-search-wrap">
          <label for="listSearchInput" class="sr-only">Rechercher dans les questions</label>
          <input type="search" id="listSearchInput" class="list-search" placeholder="Rechercher une question…" autocomplete="off" aria-label="Rechercher dans les questions" />
        </div>
        <div class="list" id="listContainer" role="list"></div>
      </section>

      <section id="catechismView" class="view" aria-label="Le catéchisme">
        <div class="content-card" id="catechismContent"></div>
      </section>

      <section id="aboutView" class="view" aria-label="À propos">
        <div class="content-card" id="aboutContent"></div>
      </section>

      <section id="bookmarksView" class="view" aria-label="Favoris">
        <div class="content-card">
          <div class="list" id="bookmarksList" role="list"></div>
        </div>
      </section>

      <section id="settingsView" class="view" aria-label="Réglages">
        <div class="content-card">
          <div class="settings">
            <div class="row">
              <div>
                <label>Vue liste</label>
                <span class="sub">Afficher les questions en liste</span>
              </div>
              <div class="toggle" id="toggleListView" role="switch" aria-checked="false" tabindex="0"><div class="knob"></div></div>
            </div>

            <div class="row">
              <div>
                <label>Réponses visibles</label>
                <span class="sub">Afficher la réponse par défaut</span>
              </div>
              <div class="toggle" id="toggleAnswersOn" role="switch" aria-checked="true" tabindex="0"><div class="knob"></div></div>
            </div>

            <div class="row">
              <div>
                <label>Mode sombre</label>
                <span class="sub">Thème sombre</span>
              </div>
              <div class="toggle" id="toggleDarkMode" role="switch" aria-checked="false" tabindex="0"><div class="knob"></div></div>
            </div>

            <div class="row">
              <div>
                <label>Masquer les flèches</label>
                <span class="sub">Masquer les flèches gauche et droite</span>
              </div>
              <div class="toggle" id="toggleHideArrows" role="switch" aria-checked="false" tabindex="0"><div class="knob"></div></div>
            </div>

            <div class="slider-wrap">
              <div class="lbl">
                <span>Taille du texte</span>
              </div>
              <div class="font-size-options" role="group" aria-label="Choix de la taille">
                <button type="button" class="font-size-option" id="fontSizePetit" data-size="24">Petit</button>
                <button type="button" class="font-size-option" id="fontSizeMoyen" data-size="32">Moyen</button>
                <button type="button" class="font-size-option" id="fontSizeGrand" data-size="42">Grand</button>
              </div>
            </div>

            <div class="reset-wrap">
              <button type="button" class="reset-btn" id="resetDataBtn">Réinitialiser les données</button>
              <span class="reset-sub">Efface les favoris et les réglages. Cette action est irréversible.</span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="sheet-backdrop" id="sheetBackdrop" aria-hidden="true"></div>

    <div class="sheet" id="menuSheet" role="dialog" aria-modal="true" aria-label="Menu">
      <header>
        <div class="sheet-title">Menu</div>
        <button class="icon-btn" id="closeMenuBtn" aria-label="Fermer"><svg viewBox="0 0 24 24" class="btn-icon" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </header>
      <div class="sheet-body">
        <div class="menu-list">
          <button class="menu-item" id="goCatechism">Le catéchisme<small>Origine et contexte</small></button>
          <button class="menu-item" id="goAbout">À propos<small>Informations sur l’app</small></button>
          <button class="menu-item" id="goBookmarks">Favoris<small>Questions en favoris</small></button>
        </div>
        <div style="margin-top:12px; color:var(--muted); font-size:12px; font-weight:700;">

    const QUESTIONS = [
  { id: 1, question: "Qui t’a créé?", answer: "Dieu m’a créé." },
  { id: 2, question: "Qu’a encore créé Dieu?", answer: "Dieu a créé toutes choses." },
  { id: 3, question: "Pourquoi Dieu t’a-t-Il créé, toi et toutes choses?", answer: "Pour Sa propre gloire." },

  { id: 5, question: "Pourquoi dois-tu glorifier Dieu?", answer: "Parce qu’Il m’a créé et prend soin de moi." },
  { id: 6, question: "Y a-t-il plusieurs dieux?", answer: "Il n’y a qu’un seul Dieu." },
  { id: 7, question: "En combien de Personnes ce seul Dieu existe-t-Il?", answer: "En trois Personnes." },
  { id: 8, question: "Qui sont-Elles?", answer: "Le Père, le Fils et le Saint-Esprit." },
  { id: 9, question: "Qui est Dieu?", answer: "Dieu est Esprit, et n’a pas de corps comme les hommes." },
  { id: 10, question: "Où est Dieu?", answer: "Dieu est partout." },
  { id: 11, question: "Peux-tu voir Dieu?", answer: "Non. Je ne peux pas voir Dieu, mais Lui me voit toujours." },
  { id: 12, question: "Dieu connaît-Il toutes choses?", answer: "Oui. Rien ne peut être caché à Dieu." },
  { id: 13, question: "Dieu peut-Il tout faire?", answer: "Oui. Dieu peut accomplir toute Sa sainte volonté." },
  { id: 14, question: "Où apprends-tu comment aimer et obéir à Dieu?", answer: "Dans la Bible seule." },
  { id: 15, question: "Qui a écrit la Bible?", answer: "Des hommes saints, instruits par le Saint-Esprit." },
  { id: 16, question: "Qui furent nos premiers parents?", answer: "Adam et Ève." },
  { id: 17, question: "De quoi nos premiers parents furent-ils faits?", answer: "Dieu fit le corps d’Adam de la poussière de la terre, et forma Ève à partir du corps d’Adam." },
  { id: 18, question: "Qu’est-ce que Dieu donna à Adam et Ève en plus de leurs corps?", answer: "Il leur donna des âmes qui ne pourraient jamais mourir." },
  { id: 19, question: "As-tu une âme aussi bien qu’un corps?", answer: "Oui. J’ai une âme qui ne pourra jamais mourir." },
  { id: 20, question: "Comment sais-tu que tu as une âme?", answer: "Parce que la Bible me le dit." },
  { id: 21, question: "Dans quel état Dieu fit-Il Adam et Ève?", answer: "Il les fit saints et heureux." },
  { id: 22, question: "Adam et Ève restèrent-ils saints et heureux?", answer: "Non. Ils péchèrent contre Dieu." },
  { id: 23, question: "Qu’est-ce que le péché?", answer: "Le péché est toute transgression de la Loi de Dieu." },
  { id: 24, question: "Que signifie transgression?", answer: "Faire ce que Dieu interdit." },
  { id: 25, question: "Quel fut le péché de nos premiers parents?", answer: "Manger le fruit défendu." },
  { id: 26, question: "Pourquoi mangèrent-ils le fruit défendu?", answer: "Parce qu’ils ne crurent pas ce que Dieu avait dit." },
  { id: 27, question: "Qui les tenta à ce péché?", answer: "Le diable tenta Ève, et elle donna le fruit à Adam." },
  { id: 28, question: "Qu’arriva-t-il à nos premiers parents quand ils eurent péché?", answer: "Au lieu d’être saints et heureux, ils devinrent pécheurs et misérables." },
  { id: 29, question: "Quel effet le péché d’Adam eut-il sur toute l’humanité?", answer: "Toute l’humanité naît dans un état de péché et de misère." },
  { id: 30, question: "Qu’héritons-nous d’Adam à la suite de ce péché originel?", answer: "Une nature pécheresse." },
  { id: 31, question: "Que mérite tout péché?", answer: "La colère et le jugement de Dieu." },
  { id: 32, question: "Quelqu’un peut-il aller au ciel avec cette nature pécheresse?", answer: "Non. Nos cœurs doivent être changés avant que nous puissions être rendus aptes pour le ciel." },
  { id: 33, question: "Comment appelle-t-on un changement de cœur?", answer: "La régénération." },
  { id: 34, question: "Qui peut changer le cœur d’un pécheur?", answer: "Le Saint-Esprit seul." },
  { id: 35, question: "Qu’est-ce que la justice?", answer: "C’est la bonté de Dieu." },
  { id: 36, question: "Quelqu’un peut-il être sauvé par sa propre justice?", answer: "Non. Personne n’est assez bon pour Dieu." },
  { id: 37, question: "Qu’est-ce qu’une alliance?", answer: "Un accord entre deux ou plusieurs personnes." },
  { id: 38, question: "Qu’est-ce que l’alliance de grâce?", answer: "L’accord que Dieu le Père a fait avec Christ concernant Son peuple élu, afin de le sauver de ses péchés." },
  { id: 39, question: "Qu’est-ce que Christ s’engagea à faire dans l’alliance de grâce?", answer: "À garder toute la Loi pour Son peuple, et à souffrir la punition due à ses péchés." },
  { id: 40, question: "Notre Seigneur Jésus-Christ a-t-Il jamais péché?", answer: "Non. Il était saint, irréprochable et sans tache." },
  { id: 41, question: "Comment le Fils de Dieu pouvait-Il souffrir?", answer: "Christ, le Fils de Dieu, prit chair et sang, afin qu’Il puisse obéir et souffrir en tant qu’homme." },
  { id: 42, question: "Qu’entend-on par l’expiation?", answer: "Christ satisfaisant la justice divine par Ses souffrances et Sa mort, à la place des pécheurs." },
  { id: 43, question: "Qu’est-ce que Dieu le Père s’engagea à faire dans l’alliance de grâce?", answer: "À justifier et à sanctifier ceux pour lesquels Christ devait mourir." },
  { id: 44, question: "Qu’est-ce que la justification?", answer: "C’est Dieu considérant les pécheurs comme s’ils n’avaient jamais péché." },
  { id: 45, question: "Qu’est-ce que la sanctification?", answer: "C’est Dieu rendant les pécheurs saints dans leur cœur et dans leur conduite." },
  { id: 46, question: "Pour qui Christ a-t-Il obéi et souffert?", answer: "Pour ceux que le Père Lui avait donnés." },
  { id: 47, question: "Quelle sorte de vie Christ mena-t-Il sur la terre?", answer: "Une vie d’obéissance parfaite à la Loi de Dieu." },
  { id: 48, question: "Quelle sorte de mort Christ mourut-Il?", answer: "La mort douloureuse et honteuse de la croix." },
  { id: 49, question: "Qui sera sauvé?", answer: "Seulement ceux qui se repentent du péché et croient en Christ." },
  { id: 50, question: "Qu’est-ce que se repentir?", answer: "Être attristé par le péché, le haïr et l’abandonner, parce qu’il déplaît à Dieu." },
  { id: 51, question: "Qu’est-ce que croire en Christ?", answer: "Se confier en Christ seul pour le salut." },
  { id: 52, question: "Peux-tu te repentir et croire en Christ par ta propre puissance?", answer: "Non. Je ne peux rien faire de bon sans le Saint-Esprit de Dieu." },
  { id: 53, question: "Comment peux-tu recevoir le Saint-Esprit?", answer: "Dieu nous a dit que nous devons Le prier pour recevoir le Saint-Esprit." },
  { id: 54, question: "Comment les personnes pieuses furent-elles sauvées avant la venue de Christ?", answer: "En croyant au Sauveur à venir." },
  { id: 55, question: "Comment montrèrent-elles leur foi?", answer: "En offrant des sacrifices sur l’autel de Dieu." },
  { id: 56, question: "Que représentaient ces sacrifices?", answer: "Christ, l’Agneau de Dieu, Qui devait mourir pour les pécheurs." },
  { id: 57, question: "Que fait Christ pour Son peuple?", answer: "Il accomplit l’œuvre d’un prophète, d’un prêtre et d’un roi." },
  { id: 58, question: "Pourquoi Christ est-Il un prophète?", answer: "Parce qu’Il nous enseigne la volonté de Dieu." },
  { id: 59, question: "Pourquoi Christ est-Il un prêtre?", answer: "Parce qu’Il est mort pour nos péchés et prie Dieu pour nous." },
  { id: 60, question: "Pourquoi Christ est-Il un roi?", answer: "Parce qu’Il règne sur nous et nous défend." },
  { id: 61, question: "Pourquoi as-tu besoin de Christ comme prophète?", answer: "Parce que je suis ignorant." },
  { id: 62, question: "Pourquoi as-tu besoin de Christ comme prêtre?", answer: "Parce que je suis coupable." },
  { id: 63, question: "Pourquoi as-tu besoin de Christ comme roi?", answer: "Parce que je suis faible et sans secours." },
  { id: 64, question: "Combien de commandements Dieu donna-t-Il sur le mont Sinaï?", answer: "Dix commandements." },
  { id: 65, question: "Comment appelle-t-on parfois les Dix Commandements?", answer: "La Loi morale de Dieu." },
  { id: 66, question: "Que nous enseignent les quatre premiers commandements?", answer: "Notre devoir envers Dieu." },
  { id: 67, question: "Que nous enseignent les six derniers commandements?", answer: "Notre devoir envers nos semblables." },
  { id: 68, question: "Quel est le résumé des Dix Commandements?", answer: "Aimer Dieu de tout mon cœur, et mon prochain comme moi-même." },
  { id: 69, question: "Qui est ton prochain?", answer: "Tous mes semblables sont mes prochains." },
  { id: 70, question: "Dieu prend-Il plaisir à ceux qui L’aiment et Lui obéissent?", answer: "Oui. Il dit : « J’aime ceux qui m’aiment. »" },
  { id: 71, question: "Dieu prend-Il plaisir à ceux qui ne L’aiment pas et ne Lui obéissent pas?", answer: "Non. Dieu est chaque jour en colère contre les méchants." },
  { id: 72, question: "Quel est le Premier Commandement?", answer: "Le Premier Commandement est : « Tu n’auras pas d’autres dieux devant ma face. »" },
  { id: 73, question: "Que nous enseigne le Premier Commandement?", answer: "À adorer Dieu seul." },
  { id: 74, question: "Quel est le Deuxième Commandement?", answer: "Le Deuxième Commandement est : « Tu ne te feras point d’image taillée, ni aucune ressemblance de ce qui est dans les cieux en haut, de ce qui est sur la terre en bas, ou de ce qui est dans les eaux au-dessous de la terre ; tu ne te prosterneras point devant elles, et tu ne les serviras point ; car moi, l’ÉTERNEL, ton Dieu, je suis un Dieu jaloux, qui punis l’iniquité des pères sur les enfants jusqu’à la troisième et à la quatrième génération de ceux qui me haïssent, et qui fais miséricorde jusqu’à mille générations à ceux qui m’aiment et qui gardent mes commandements. »" },
  { id: 75, question: "Que nous enseigne le Deuxième Commandement?", answer: "À adorer Dieu de la bonne manière, et à éviter l’idolâtrie." },
  { id: 76, question: "Quel est le Troisième Commandement?", answer: "Le Troisième Commandement est : « Tu ne prendras point le nom de l’ÉTERNEL, ton Dieu, en vain ; car l’ÉTERNEL ne laissera point impuni celui qui prendra son nom en vain. »" },
  { id: 77, question: "Que nous enseigne le Troisième Commandement?", answer: "À révérer le nom de Dieu, Sa Parole et Ses œuvres." },
  { id: 78, question: "Quel est le Quatrième Commandement?", answer: "Le Quatrième Commandement est : « Souviens-toi du jour du sabbat, pour le sanctifier. Tu travailleras six jours, et tu feras tout ton ouvrage ; mais le septième jour est le sabbat de l’ÉTERNEL, ton Dieu : tu ne feras aucun ouvrage, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni ton bétail, ni l’étranger qui est dans tes portes. Car en six jours l’ÉTERNEL a fait les cieux, la terre, la mer, et tout ce qui y est contenu, et Il s’est reposé le septième jour ; c’est pourquoi l’ÉTERNEL a béni le jour du sabbat et l’a sanctifié. »" },
  { id: 79, question: "Que nous enseigne le Quatrième Commandement?", answer: "À sanctifier le sabbat." },
  { id: 80, question: "Quel jour de la semaine est le sabbat chrétien?", answer: "Le premier jour de la semaine, appelé le Jour du Seigneur." },
  { id: 81, question: "Pourquoi est-il appelé le Jour du Seigneur?", answer: "Parce que ce jour-là Christ ressuscita d’entre les morts." },
  { id: 82, question: "Comment le sabbat doit-il être observé?", answer: "Dans la prière et la louange, en écoutant et en lisant la Parole de Dieu, et en faisant du bien à nos semblables." },
  { id: 83, question: "Quel est le Cinquième Commandement?", answer: "Le Cinquième Commandement est : « Honore ton père et ta mère, afin que tes jours se prolongent dans le pays que l’ÉTERNEL, ton Dieu, te donne. »" },
  { id: 84, question: "Que nous enseigne le Cinquième Commandement?", answer: "À aimer et à obéir à nos parents." },
  { id: 85, question: "Quel est le Sixième Commandement?", answer: "Le Sixième Commandement est : « Tu ne tueras point. »" },
  { id: 86, question: "Que nous enseigne le Sixième Commandement?", answer: "À éviter la haine." },
  { id: 87, question: "Quel est le Septième Commandement?", answer: "Le Septième Commandement est : « Tu ne commettras point d’adultère. »" },
  { id: 88, question: "Que nous enseigne le Septième Commandement?", answer: "À être purs dans le cœur, dans le langage et dans la conduite." },
  { id: 89, question: "Quel est le Huitième Commandement?", answer: "Le Huitième Commandement est : « Tu ne déroberas point. »" },
  { id: 90, question: "Que nous enseigne le Huitième Commandement?", answer: "À être honnêtes et à ne pas prendre les biens d’autrui." },
  { id: 91, question: "Quel est le Neuvième Commandement?", answer: "Le Neuvième Commandement est : « Tu ne porteras point de faux témoignage contre ton prochain. »" },
  { id: 92, question: "Que nous enseigne le Neuvième Commandement?", answer: "À dire la vérité et à ne pas dire du mal des autres." },
  { id: 93, question: "Quel est le Dixième Commandement?", answer: "Le Dixième Commandement est : « Tu ne convoiteras point la maison de ton prochain ; tu ne convoiteras point la femme de ton prochain, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni aucune chose qui appartienne à ton prochain. »" },
  { id: 94, question: "Que nous enseigne le Dixième Commandement?", answer: "À être contents de ce que nous avons." },
  { id: 95, question: "Un homme peut-il observer parfaitement ces Dix Commandements?", answer: "Aucun simple homme, depuis la chute d’Adam, n’a jamais observé ni ne peut observer parfaitement les Dix Commandements." },
  { id: 96, question: "À quoi nous servent les Dix Commandements?", answer: "Ils nous enseignent notre devoir, et nous montrent notre besoin d’un Sauveur." },
  { id: 97, question: "Qu’est-ce que la prière?", answer: "La prière, c’est parler avec Dieu." },
  { id: 98, question: "En quel nom devons-nous prier?", answer: "Seulement au nom de Christ." },
  { id: 99, question: "Qu’est-ce que Christ nous a donné pour nous enseigner à prier?", answer: "La prière du Seigneur." },
  { id: 100, question: "Peux-tu réciter la prière du Seigneur?", answer: "« Notre Père qui es aux cieux, que ton nom soit sanctifié ; que ton règne vienne ; que ta volonté soit faite sur la terre comme au ciel. Donne-nous aujourd’hui notre pain quotidien. Pardonne-nous nos offenses, comme nous pardonnons aussi à ceux qui nous ont offensés. Et ne nous induis pas en tentation, mais délivre-nous du mal. Car c’est à toi qu’appartiennent le règne, la puissance et la gloire, aux siècles des siècles. Amen. »" },
  { id: 101, question: "Combien y a-t-il de demandes dans la prière du Seigneur?", answer: "Six." },
  { id: 102, question: "Quelle est la première demande?", answer: "« Que ton nom soit sanctifié. »" },
  { id: 103, question: "Que demandons-nous dans la première demande?", answer: "Que le nom de Dieu soit honoré par nous et par tous les hommes." },
  { id: 104, question: "Quelle est la deuxième demande?", answer: "« Que ton règne vienne. »" },
  { id: 105, question: "Que demandons-nous dans la deuxième demande?", answer: "Que l’Évangile soit prêché dans le monde entier, et cru et obéi par nous et par tous les hommes." },
  { id: 106, question: "Quelle est la troisième demande?", answer: "« Que ta volonté soit faite sur la terre comme au ciel. »" },
  { id: 107, question: "Que demandons-nous dans la troisième demande?", answer: "Que les hommes sur la terre servent Dieu comme les anges le font dans le ciel." },
  { id: 108, question: "Quelle est la quatrième demande?", answer: "« Donne-nous aujourd’hui notre pain quotidien. »" },
  { id: 109, question: "Que demandons-nous dans la quatrième demande?", answer: "Que Dieu nous donne toutes les choses nécessaires à nos corps." },
  { id: 110, question: "Quelle est la cinquième demande?", answer: "« Et pardonne-nous nos offenses, comme nous pardonnons aussi à ceux qui nous ont offensés. »" },
  { id: 111, question: "Que demandons-nous dans la cinquième demande?", answer: "Que Dieu pardonne nos péchés, et nous aide à pardonner à ceux qui ont péché contre nous." },
  { id: 112, question: "Quelle est la sixième demande?", answer: "« Et ne nous induis pas en tentation, mais délivre-nous du mal. »" },
  { id: 113, question: "Que demandons-nous dans la sixième demande?", answer: "Que Dieu nous garde du péché." },
  { id: 114, question: "Comment le Saint-Esprit nous amène-t-Il au salut?", answer: "Il utilise la Bible, qui est la Parole de Dieu." },
  { id: 115, question: "Comment pouvons-nous connaître la Parole de Dieu?", answer: "Il nous est commandé d’entendre, de lire et de sonder les Écritures." },
  { id: 116, question: "Qu’est-ce qu’une Église?", answer: "Une assemblée de croyants réunis sous la prédication de la Parole de Dieu." },
  { id: 117, question: "Quelles sont les deux ordonnances que Christ a données à Son Église?", answer: "Le baptême et la Sainte Cène." },
  { id: 118, question: "Pourquoi Christ a-t-Il donné ces ordonnances?", answer: "Pour montrer que Ses disciples Lui appartiennent, et pour leur rappeler ce qu’Il a fait pour eux." },
  { id: 119, question: "Qu’est-ce que le baptême?", answer: "L’immersion des croyants dans l’eau, comme signe de leur union avec Christ dans Sa mort, Son ensevelissement et Sa résurrection." },
  { id: 120, question: "Quel est le but du baptême?", answer: "Montrer aux croyants que Dieu les a purifiés de leurs péchés par Jésus-Christ." },
  { id: 121, question: "Qui doit être baptisé?", answer: "Seulement ceux qui se repentent de leurs péchés et croient en Christ pour le salut." },
  { id: 122, question: "Les bébés doivent-ils être baptisés?", answer: "Non ; parce que la Bible ne le commande pas et n’en donne aucun exemple." },
  { id: 123, question: "Qu’est-ce que la Sainte Cène?", answer: "Le fait de manger du pain et de boire du vin pour se souvenir des souffrances et de la mort de Christ." },
  { id: 124, question: "Que représente le pain?", answer: "Le corps de Christ, brisé pour nos péchés." },
  { id: 125, question: "Que représente le vin?", answer: "Le sang de Christ, versé pour notre salut." },
  { id: 126, question: "Qui doit prendre part à la Sainte Cène?", answer: "Seulement ceux qui se repentent de leurs péchés, croient en Christ pour le salut, et aiment leurs semblables." },
  { id: 127, question: "Christ est-Il resté dans le tombeau après Sa crucifixion?", answer: "Non. Il ressuscita du tombeau le troisième jour après Sa mort." },
  { id: 128, question: "Où est Christ maintenant?", answer: "Au ciel, assis à la droite de Dieu le Père." },
  { id: 129, question: "Christ reviendra-t-Il?", answer: "Oui. Au dernier jour, Il viendra juger le monde." },
  { id: 130, question: "Que devient l’homme lorsqu’il meurt?", answer: "Le corps retourne à la poussière, et l’âme va dans le monde des esprits." },
  { id: 131, question: "Les corps des morts seront-ils ressuscités pour revenir à la vie?", answer: "Oui. « Il y aura une résurrection des morts, des justes et des injustes. »" },
  { id: 132, question: "Qu’arrivera-t-il aux méchants au Jour du Jugement?", answer: "Ils seront jetés en enfer." },
  { id: 133, question: "Qu’est-ce que l’enfer?", answer: "Un lieu de châtiment terrible et sans fin." },
  { id: 134, question: "Qu’arrivera-t-il aux justes au Jour du Jugement?", answer: "Ils vivront avec Christ pour toujours, dans de nouveaux cieux et une nouvelle terre." }
];

      qText: document.getElementById("qText"),
      aText: document.getElementById("aText"),
      toggleAnswer: document.getElementById("toggleAnswer"),
      qSlider: document.getElementById("qSlider"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      bookmarkBtn: document.getElementById("bookmarkBtn"),
      shuffleBtn: document.getElementById("shuffleBtn"),
      bookmarksList: document.getElementById("bookmarksList"),
      aboutContent: document.getElementById("aboutContent"),
      menuBtn: document.getElementById("menuBtn"),
      backBtn: document.getElementById("backBtn"),
      settingsBtn: document.getElementById("settingsBtn"),
      settingsBackdrop: document.getElementById("settingsBackdrop"),
      sheetBackdrop: document.getElementById("sheetBackdrop"),
      menuSheet: document.getElementById("menuSheet"),
      closeMenuBtn: document.getElementById("closeMenuBtn"),
      goCatechism: document.getElementById("goCatechism"),
      goBookmarks: document.getElementById("goBookmarks"),
      goAbout: document.getElementById("goAbout"),
      versionLabel: document.getElementById("versionLabel"),
      toggleListView: document.getElementById("toggleListView"),
      toggleAnswersOn: document.getElementById("toggleAnswersOn"),
      toggleDarkMode: document.getElementById("toggleDarkMode"),
      toggleHideArrows: document.getElementById("toggleHideArrows"),
      fontSizePetit: document.getElementById("fontSizePetit"),
      fontSizeMoyen: document.getElementById("fontSizeMoyen"),
      fontSizeGrand: document.getElementById("fontSizeGrand"),
      resetDataBtn: document.getElementById("resetDataBtn"),
    };

    const STORAGE_KEY = "catechism_app_state_v2";

    /* ——— État central (progression, favoris, préférences) ——— */
    const App = {
      State: null,
      loadState(){
        const base = {
          currentIndex: 0,
          showAnswer: true,
          darkMode: false,
          hideArrows: false,
          listView: false,
          fontSize: 32,
          bookmarks: []
        };
        const systemDark = () => window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) { base.darkMode = systemDark(); App.State = base; return base; }
          const parsed = JSON.parse(raw);
          App.State = { ...base, ...parsed };
          return App.State;
        } catch {
          base.darkMode = systemDark();
          App.State = base;
          return base;
        }
      },
      saveState(){
        clearTimeout(App._saveTimer);
        App._saveTimer = setTimeout(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(App.State)); }, 200);
      },
      saveStateNow(){ clearTimeout(App._saveTimer); localStorage.setItem(STORAGE_KEY, JSON.stringify(App.State)); }
    };
    App.loadState();
    const state = App.State;

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }
    function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function getCurrentQuestion(){ return QUESTIONS[state.currentIndex] || QUESTIONS[0]; }

    function viewTransition(callback){ callback(); }

    /* ——— Feedback haptique (mobile) ——— */
    function haptic(ms){ if (navigator.vibrate) navigator.vibrate(ms ?? 8); }

    /* ——— Annonces lecteurs d'écran (a11y) ——— */
    function announce(message){
      const el = els.liveAnnouncer;
      if (!el) return;
      el.textContent = "";
      requestAnimationFrame(() => { el.textContent = message; });
    }

    function saveState(){ App.saveState(); }
    function saveStateNow(){ App.saveStateNow(); }

    function setTheme(){
      document.body.classList.toggle("theme-dark", !!state.darkMode);
      document.body.classList.toggle("theme-light", !state.darkMode);
    }

    function setFontSize(){
      const v = clamp(state.fontSize, 24, 42);
      const sizePetit = els.fontSizePetit; const sizeMoyen = els.fontSizeMoyen; const sizeGrand = els.fontSizeGrand;
      if(sizePetit){ sizePetit.classList.toggle("selected", v <= 28); }
      if(sizeMoyen){ sizeMoyen.classList.toggle("selected", v > 28 && v < 37); }
      if(sizeGrand){ sizeGrand.classList.toggle("selected", v >= 37); }
      const aSize = v <= 28 ? 12 : v < 37 ? 16 : 20;
      document.documentElement.style.setProperty("--q", `${v}px`);
      document.documentElement.style.setProperty("--a", `${aSize}px`);
    }

    let _currentView = "";
    function showView(name){
      if (_currentView === name) return;
      const map = {
        question: els.questionView,
        list: els.listView,
        catechism: els.catechismView,
        about: els.aboutView,
        bookmarks: els.bookmarksView,
        settings: els.settingsView
      };
      viewTransition(() => {
        _currentView = name;
        for (const k in map) map[k].classList.remove("active");
        map[name].classList.add("active");
        if (name === "settings") els.settingsBackdrop.classList.add("show");
        else els.settingsBackdrop.classList.remove("show");
        const titleMap = { question: "Question", list: "Vue liste", catechism: "Le catéchisme", about: "À propos", bookmarks: "Favoris", settings: "Réglages" };
        els.headerTitle.textContent = titleMap[name] || "Question";
        const showBack = (name === "catechism" || name === "about" || name === "bookmarks" || name === "settings");
        els.backBtn.style.display = showBack ? "" : "none";
        els.settingsBtn.style.display = showBack ? "none" : "";
      });
    }

    function leaveSettings(){
      els.settingsBackdrop.classList.remove("show");
      if(state.listView){
        renderList();
        showView("list");
      }else{
        showView("question");
      }
    }

    function renderQuestion(){
      const q = getCurrentQuestion();
      const num = state.currentIndex + 1;
      els.qNum.textContent = "QUESTION " + num;
      els.qText.textContent = q.question;
      els.aText.textContent = q.answer;

      if (state.showAnswer) {
        els.aText.classList.remove("hidden");
        els.toggleAnswer.textContent = "Masquer la réponse";
      } else {
        els.aText.classList.add("hidden");
        els.toggleAnswer.textContent = "Montrer la réponse";
      }

      const isBookmarked = state.bookmarks.includes(q.id);
      els.bookmarkBtn.classList.toggle("is-bookmarked", isBookmarked);
      els.bookmarkBtn.setAttribute("aria-label", isBookmarked ? "Retirer des favoris" : "Ajouter aux favoris");

      els.qSlider.min = "0";
      els.qSlider.max = String(QUESTIONS.length - 1);
      els.qSlider.value = String(state.currentIndex);

      els.prevBtn.disabled = state.currentIndex <= 0;
      els.nextBtn.disabled = state.currentIndex >= QUESTIONS.length - 1;
      els.prevBtn.style.display = state.hideArrows ? "none" : "";
      els.nextBtn.style.display = state.hideArrows ? "none" : "";

      announce("Question " + num + " sur " + QUESTIONS.length + ". " + q.question);
    }

    function getListSearchQuery(){ return (els.listSearchInput && els.listSearchInput.value) ? els.listSearchInput.value.trim().toLowerCase() : ""; }

    function renderList(){
      const query = getListSearchQuery();
      const frag = document.createDocumentFragment();
      for (let idx = 0; idx < QUESTIONS.length; idx++) {
        const q = QUESTIONS[idx];
        const match = !query || q.question.toLowerCase().includes(query) || q.answer.toLowerCase().includes(query);
        const row = document.createElement("div");
        row.className = "list-item";
        row.setAttribute("role", "listitem");
        row.dataset.index = String(idx);
        row.dataset.hidden = match ? "false" : "true";
        if (state.showAnswer) row.classList.add("expanded");
        row.innerHTML = "<div class=\"list-item-row\"><div class=\"n\">" + (idx + 1) + "</div><div class=\"t\">" + q.question + "</div></div><div class=\"list-item-answer\">" + escapeHtml(q.answer) + "</div>";
        frag.appendChild(row);
      }
      els.listContainer.innerHTML = "";
      els.listContainer.appendChild(frag);
    }

    function renderBookmarks(){
      els.bookmarksList.innerHTML = "";
      const bookmarksSet = state.bookmarks.length ? new Set(state.bookmarks) : null;
      if(!bookmarksSet || bookmarksSet.size === 0){
        els.bookmarksList.innerHTML = "<div class=\"list-item list-item-empty\"><div class=\"t\">Aucun favori.</div></div>";
        return;
      }
      const frag = document.createDocumentFragment();
      for(let i = 0; i < QUESTIONS.length; i++){
        if(!bookmarksSet.has(QUESTIONS[i].id)) continue;
        const row = document.createElement("div");
        row.className = "list-item";
        row.setAttribute("role", "listitem");
        row.dataset.index = String(i);
        row.innerHTML = "<div class=\"list-item-row\"><div class=\"n\">" + (i + 1) + "</div><div class=\"t\">" + QUESTIONS[i].question + "</div></div>";
        frag.appendChild(row);
      }
      els.bookmarksList.appendChild(frag);
    }

    function renderCatechism(){
      els.catechismContent.innerHTML = CATECHISM_TEXT.paragraphs.map(p => "<p>" + escapeHtml(p) + "</p>").join("");
    }

    function renderAbout(){
      els.aboutContent.innerHTML = ABOUT_TEXT.paragraphs.map(p => "<p>" + escapeHtml(p) + "</p>").join("");
    }

    function toggle(el, value){
      el.classList.toggle("on", !!value);
      el.setAttribute("aria-checked", value ? "true" : "false");
    }

    function openMenu(){
      els.sheetBackdrop.classList.add("show");
      els.menuSheet.classList.add("show");
      document.body.style.overflow = "hidden";
    }
    function closeMenu(){
      els.sheetBackdrop.classList.remove("show");
      els.menuSheet.classList.remove("show");
      document.body.style.overflow = "";
    }

    els.toggleAnswer.addEventListener("click", () => {
      haptic();
      state.showAnswer = !state.showAnswer;
      toggle(els.toggleAnswersOn, state.showAnswer);
      saveState();
      renderQuestion();
    });

    /* Délégation d'événements sur le conteneur liste */
    els.listContainer.addEventListener("click", function(e){
      const row = e.target.closest(".list-item");
      if (!row || row.classList.contains("list-item-empty") || row.dataset.hidden === "true") return;
      const idx = parseInt(row.dataset.index, 10);
      if (isNaN(idx)) return;
      haptic();
      const wasExpanded = row.classList.contains("expanded");
      const expanded = els.listContainer.querySelector(".list-item.expanded");
      if (expanded) expanded.classList.remove("expanded");
      if (!wasExpanded) row.classList.add("expanded");
      state.currentIndex = idx;
      saveState();
    });

    if (els.listSearchInput) {
      els.listSearchInput.addEventListener("input", () => renderList());
      els.listSearchInput.addEventListener("search", () => renderList());
    }

    els.bookmarksList.addEventListener("click", function(e){
      const row = e.target.closest(".list-item");
      if (!row || row.classList.contains("list-item-empty")) return;
      const idx = parseInt(row.dataset.index, 10);
      if (isNaN(idx)) return;
      haptic();
      state.currentIndex = idx;
      saveState();
      viewTransition(() => { renderQuestion(); showView("question"); });
    });

    function goQuestion(index){
      state.currentIndex = clamp(index, 0, QUESTIONS.length - 1);
      saveState();
      viewTransition(() => renderQuestion());
    }

    els.prevBtn.addEventListener("click", () => { haptic(); goQuestion(state.currentIndex - 1); });
    els.nextBtn.addEventListener("click", () => { haptic(); goQuestion(state.currentIndex + 1); });

    els.qSlider.addEventListener("input", e => {
      goQuestion(Number(e.target.value));
    });

    els.bookmarkBtn.addEventListener("click", () => {
      haptic();
      const id = getCurrentQuestion().id;
      const i = state.bookmarks.indexOf(id);
      if (i === -1) state.bookmarks.push(id);
      else state.bookmarks.splice(i, 1);
      saveState();
      renderQuestion();
    });

    els.shuffleBtn.addEventListener("click", () => {
      if (QUESTIONS.length <= 1) return;
      haptic();
      let n;
      do { n = Math.floor(Math.random() * QUESTIONS.length); } while (n === state.currentIndex);
      goQuestion(n);
    });

    /* Menu */
    els.menuBtn.addEventListener("click", () => { haptic(); openMenu(); });
    els.closeMenuBtn.addEventListener("click", () => { haptic(); closeMenu(); });
    els.sheetBackdrop.addEventListener("click", closeMenu);

    els.goCatechism.addEventListener("click", () => { closeMenu(); renderCatechism(); showView("catechism"); });
    els.goAbout.addEventListener("click", () => { closeMenu(); renderAbout(); showView("about"); });
    els.goBookmarks.addEventListener("click", () => { closeMenu(); renderBookmarks(); showView("bookmarks"); });

    els.backBtn.addEventListener("click", () => { haptic(); if (els.settingsView.classList.contains("active")) leaveSettings(); else showView("question"); });

    els.settingsBtn.addEventListener("click", () => { haptic(); if (els.settingsView.classList.contains("active")) leaveSettings(); else showView("settings"); });

    els.settingsBackdrop.addEventListener("click", leaveSettings);

    els.toggleListView.addEventListener("click", () => {
      state.listView = !state.listView;
      toggle(els.toggleListView, state.listView);
      saveState();
      if(state.listView){
        renderList();
        showView("list");
      }else{
        showView("question");
      }
    });

    els.toggleAnswersOn.addEventListener("click", () => {
      state.showAnswer = !state.showAnswer;
      toggle(els.toggleAnswersOn, state.showAnswer);
      saveState();
      renderQuestion();
    });

    els.toggleDarkMode.addEventListener("click", () => {
      state.darkMode = !state.darkMode;
      toggle(els.toggleDarkMode, state.darkMode);
      setTheme();
      saveState();
    });

    els.toggleHideArrows.addEventListener("click", () => {
      state.hideArrows = !state.hideArrows;
      toggle(els.toggleHideArrows, state.hideArrows);
      saveState();
      renderQuestion();
    });

    [els.fontSizePetit, els.fontSizeMoyen, els.fontSizeGrand].forEach(btn => {
      if(!btn) return;
      btn.addEventListener("click", () => {
        state.fontSize = Number(btn.getAttribute("data-size"));
        setFontSize();
        saveState();
      });
    });

    if(els.resetDataBtn){
      els.resetDataBtn.addEventListener("click", () => {
        if(!confirm("Réinitialiser les favoris et les réglages ? Cette action est irréversible.")) return;
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      });
    }

    document.addEventListener("keydown", e => {
      const menuOpen = els.menuSheet.classList.contains("show");
      const isDesktop = window.matchMedia("(min-width: 768px)").matches;
      const inInput = e.target.closest("input") || e.target.closest("textarea") || e.target.closest("[contenteditable]");

      if(e.key === "Escape"){
        if(menuOpen){ closeMenu(); e.preventDefault(); return; }
        const onMenuPage = (_currentView === "catechism" || _currentView === "about" || _currentView === "bookmarks");
        if(isDesktop && onMenuPage){
          showView("question");
          e.preventDefault();
        }
        return;
      }

      /* Raccourcis desktop: V = bascule vue question/liste, Espace = afficher/masquer réponses */
      if(isDesktop && !menuOpen && !inInput){
        if(e.key === "v" || e.key === "V"){
          state.listView = !state.listView;
          toggle(els.toggleListView, state.listView);
          saveState();
          if(state.listView){
            renderList();
            showView("list");
          }else{
            showView("question");
          }
          e.preventDefault();
          return;
        }
        if((e.key === "s" || e.key === "S") && els.questionView.classList.contains("active")){
          els.shuffleBtn.click();
          e.preventDefault();
          return;
        }
        if((e.key === "f" || e.key === "F") && els.questionView.classList.contains("active")){
          els.bookmarkBtn.click();
          e.preventDefault();
          return;
        }
        if(e.key === " "){
          if(!e.target.closest("button")){
            if(els.questionView.classList.contains("active")){
              state.showAnswer = !state.showAnswer;
              toggle(els.toggleAnswersOn, state.showAnswer);
              saveState();
              renderQuestion();
              e.preventDefault();
            }else if(els.listView.classList.contains("active")){
              state.showAnswer = !state.showAnswer;
              toggle(els.toggleAnswersOn, state.showAnswer);
              saveState();
              renderList();
              e.preventDefault();
            }
          }
          return;
        }
      }

      if(els.questionView.classList.contains("active") && !menuOpen){
        if(e.key === "ArrowLeft"){ els.prevBtn.click(); e.preventDefault(); }
        else if(e.key === "ArrowRight"){ els.nextBtn.click(); e.preventDefault(); }
      }
    });

    (function setupSwipe(){
      const threshold = 60;
      let startX = 0;
      let startY = 0;
      els.questionView.addEventListener("touchstart", e => {
        if(!els.questionView.classList.contains("active") || els.menuSheet.classList.contains("show")) return;
        startX = e.changedTouches[0].clientX;
        startY = e.changedTouches[0].clientY;
      }, { passive: true });
      els.questionView.addEventListener("touchend", e => {
        if(!els.questionView.classList.contains("active") || els.menuSheet.classList.contains("show")) return;
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        const deltaX = endX - startX;
        const deltaY = Math.abs(endY - startY);
        if(Math.abs(deltaX) < threshold || Math.abs(deltaX) < deltaY) return;
        if(deltaX > 0){ els.prevBtn.click(); }
        else{ els.nextBtn.click(); }
      }, { passive: true });
    })();

    window.addEventListener("pagehide", saveStateNow);

    function init(){
      els.versionLabel.textContent = APP_VERSION;
      toggle(els.toggleListView, state.listView);
      toggle(els.toggleAnswersOn, state.showAnswer);
      toggle(els.toggleDarkMode, state.darkMode);
      toggle(els.toggleHideArrows, state.hideArrows);
      setTheme();
      setFontSize();
      renderQuestion();

      if (state.listView) {
        renderList();
        showView("list");
      } else {
        showView("question");
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      }
    }

    init();
  </script>
</body>
</html>
